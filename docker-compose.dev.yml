services:
  neon-local:
    image: neondatabase/neon_local:latest
    ports:
      - "5432:5432"
    env_file:
      - .env.development
    environment:
      # neon-local expects PARENT_BRANCH_ID, not NEON_PARENT_BRANCH_ID
      PARENT_BRANCH_ID: ${NEON_PARENT_BRANCH_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U neon"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  app:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      NEON_LOCAL_HOST: neon-local
      DATABASE_URL: postgres://neon:npg@neon-local:5432/neondb
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      neon-local:
        condition: service_healthy
